  <!-- Diamond decorations -->
  <g opacity="0.15">
    <path d="M0 -20 Q7 -7 20 0 Q7 7 0 20 Q-7 7 -20 0 Q-7 -7 0 -20 Z" fill="#06B6D4" transform="translate(180, 180)"/>
    <path d="M0 -15 Q5 -5 15 0 Q5 5 0 15 Q-5 5 -15 0 Q-5 -5 0 -15 Z" fill="#a78bfa" transform="translate(1020, 450)"/>
    <path d="M0 -12 Q4 -4 12 0 Q4 4 0 12 Q-4 4 -12 0 Q-4 -4 0 -12 Z" fill="#00F5FF" transform="translate(950, 150)"/>
    <path d="M0 -8 Q3 -3 8 0 Q3 3 0 8 Q-3 3 -8 0 Q-3 -3 0 -8 Z" fill="#4C78FF" transform="translate(250, 470)"/>
  </g>

  <!-- Logo icon (simplified) -->
  <g transform="translate(520, 160) scale(3.5)">
    <rect x="4" y="6" width="8" height="2" rx="1" fill="#4C78FF"/>
    <rect x="4" y="10" width="12" height="2" rx="1" fill="#00D4FF"/>
    <rect x="4" y="14" width="6" height="2" rx="1" fill="#00F5FF"/>
    <circle cx="3" cy="7" r="1.5" fill="#825AFF"/>
    <circle cx="3" cy="11" r="1.5" fill="#00D4FF"/>
    <circle cx="3" cy="15" r="1.5" fill="#00F5FF"/>
    <g transform="translate(13,7) scale(0.7)">
      <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00F5FF"/>
      <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    </g>
    <g transform="translate(17,11) scale(1.3)">
      <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00F5FF"/>
      <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    </g>
  </g>

  <!-- SmartPMO.ai text -->
  <text x="600" y="310" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#b0c4de" letter-spacing="0.1em">SmartPMO.ai</text>

  <!-- Main title -->
  <text x="600" y="380" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="64" font-weight="800" fill="url(#titleGrad)" letter-spacing="-0.02em">SmartPMO Prompts</text>

  <!-- Divider line -->
  <rect x="350" y="410" width="500" height="2" rx="1" fill="url(#lineGrad)"/>

  <!-- Subtitle -->
  <text x="600" y="460" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#b0c4de">AI Prompts for PMO Professionals</text>

  <!-- Bottom tagline -->
  <text x="600" y="520" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#6b7280">Free &#183; Expert-crafted &#183; Anti-hallucination techniques built in</text>

  <!-- Border accent -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#titleGrad)"/>
  <rect x="0" y="627" width="1200" height="3" fill="url(#titleGrad)"/>
</svg>