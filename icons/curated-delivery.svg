<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Email envelope in grayscale -->
  <rect x="32" y="37.3" width="64" height="48" rx="8" fill="#808080" opacity="0.8"/>
  <rect x="34.7" y="40" width="58.7" height="42.7" rx="5.3" fill="#ffffff"/>
  
  <!-- Email fold/flap in grayscale -->
  <path d="M34.7 40 L64 64 L93.3 40" stroke="#000000" stroke-width="5.3" fill="none"/>
  <path d="M34.7 40 L64 61.3 L93.3 40 L93.3 45.3 L64 66.7 L34.7 45.3 Z" fill="#000000" opacity="0.6"/>
  
  <!-- Content dots in black -->
  <circle cx="48" cy="69.3" r="3.2" fill="#000000"/>
  <circle cx="64" cy="69.3" r="3.2" fill="#000000"/>
  <circle cx="80" cy="69.3" r="3.2" fill="#000000"/>
  
  <!-- Star 1 - Small (top left, close to envelope) -->
  <g transform="translate(25,25) scale(2.1)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
  
  <!-- Star 2 - Large (top right, close to envelope) -->
  <g transform="translate(100,20) scale(3.9)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#00d4aa"/>
  </g>
  
  <!-- Star 3 - Medium (bottom left, close to envelope) -->
  <g transform="translate(30,92) scale(3.0)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ffffff"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
</svg>
