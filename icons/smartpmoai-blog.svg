<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Pen body in grayscale -->
  <rect x="45" y="25" width="8" height="50" rx="4" fill="#808080"/>
  <rect x="46" y="26" width="6" height="48" rx="3" fill="#ffffff"/>
  
  <!-- Pen tip in black -->
  <polygon points="49,75 51,75 52,85 48,85" fill="#000000"/>
  <rect x="48.5" y="83" width="3" height="4" fill="#000000"/>
  
  <!-- Pen cap/top in gray -->
  <rect x="44" y="20" width="10" height="8" rx="5" fill="#808080"/>
  <circle cx="49" cy="22" r="1.5" fill="#ffffff"/>
  
  <!-- Writing lines flowing from pen -->
  <rect x="55" y="85" width="25" height="2" rx="1" fill="#808080"/>
  <rect x="60" y="90" width="30" height="2" rx="1" fill="#ffffff"/>
  <rect x="58" y="95" width="20" height="2" rx="1" fill="#000000"/>
  <rect x="62" y="100" width="28" height="2" rx="1" fill="#808080"/>
  <rect x="65" y="105" width="18" height="2" rx="1" fill="#ffffff"/>
  
  <!-- Small dots representing ink/inspiration -->
  <circle cx="52" cy="88" r="1" fill="#000000"/>
  <circle cx="54" cy="91" r="0.8" fill="#808080"/>
  <circle cx="56" cy="86" r="0.6" fill="#ffffff"/>
  
  <!-- Star 1 - Small (top left, close to pen) -->
  <g transform="translate(25,15) scale(2.1)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
  
  <!-- Star 2 - Large (top right, close to writing lines) -->
  <g transform="translate(95,35) scale(3.9)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#00d4aa"/>
  </g>
  
  <!-- Star 3 - Medium (bottom right, close to writing lines) -->
  <g transform="translate(100,100) scale(3.0)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ffffff"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
</svg>
