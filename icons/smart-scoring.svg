<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Relevance gauge arc in grayscale -->
  <path d="M 37.3 69.3 A 26.7 26.7 0 0 1 90.7 69.3" fill="none" stroke="#000000" stroke-width="6.4" opacity="0.3"/>
  <path d="M 37.3 69.3 A 26.7 26.7 0 0 1 77.3 50.7" fill="none" stroke="#ffffff" stroke-width="9.6" stroke-linecap="round"/>
  
  <!-- Gauge tick marks in white -->
  <line x1="37.3" y1="69.3" x2="40.5" y2="67.2" stroke="#ffffff" stroke-width="4.3"/>
  <line x1="50.7" y1="50.7" x2="53.3" y2="53.3" stroke="#ffffff" stroke-width="4.3"/>
  <line x1="64" y1="45.3" x2="64" y2="49.1" stroke="#ffffff" stroke-width="4.3"/>
  <line x1="77.3" y1="50.7" x2="74.7" y2="53.3" stroke="#ffffff" stroke-width="4.3"/>
  <line x1="90.7" y1="69.3" x2="87.5" y2="67.2" stroke="#ffffff" stroke-width="4.3"/>
  
  <!-- Gauge needle in white -->
  <line x1="64" y1="69.3" x2="74.7" y2="53.3" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Center point -->
  <circle cx="64" cy="69.3" r="3.2" fill="#ffffff"/>
  
  <!-- Score text in white -->
  <text x="64" y="90.7" fill="#ffffff" font-size="18.7" font-weight="bold" text-anchor="middle">8/10</text>
  
  <!-- Star 1 - Small (top left, close to gauge) -->
  <g transform="translate(20,20) scale(2.1)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
  
  <!-- Star 2 - Large (top right, close to gauge) -->
  <g transform="translate(105,20) scale(3.9)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#00d4aa"/>
  </g>
  
  <!-- Star 3 - Medium (bottom center, close to gauge) -->
  <g transform="translate(64,105) scale(3.0)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ffffff"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
</svg>
