<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">

  <!-- Psychedelic Layered Central Image -->
  <circle cx="64" cy="64" r="30" fill="#808080" opacity="0.3"/>
  <rect x="40" y="40" width="15" height="10" rx="2" fill="#000000" transform="rotate(15 47.5 45)"/>
  <rect x="55" y="35" width="15" height="10" rx="2" fill="#ffffff" transform="rotate(-20 62.5 40)"/>
  <rect x="65" y="45" width="15" height="10" rx="2" fill="#808080" transform="rotate(30 72.5 50)"/>
  <rect x="45" y="60" width="15" height="10" rx="2" fill="#000000" transform="rotate(-15 52.5 65)"/>
  <rect x="60" y="70" width="15" height="10" rx="2" fill="#ffffff" transform="rotate(25 67.5 75)"/>
  <rect x="35" y="65" width="15" height="10" rx="2" fill="#808080" transform="rotate(-25 42.5 70)"/>
  <!-- Inner psychedelic layers -->
  <circle cx="64" cy="64" r="28" fill="#ffffff" opacity="0.5"/>
  <rect x="41" y="41" width="13" height="9" rx="1.8" fill="#808080" opacity="0.7" transform="rotate(15 47.5 45)"/>
  <rect x="56" y="36" width="13" height="9" rx="1.8" fill="#000000" opacity="0.6" transform="rotate(-20 62.5 40)"/>
  <rect x="66" y="46" width="13" height="9" rx="1.8" fill="#ffffff" opacity="0.8" transform="rotate(30 72.5 50)"/>
  <rect x="46" y="61" width="13" height="9" rx="1.8" fill="#808080" opacity="0.6" transform="rotate(-15 52.5 65)"/>
  <rect x="61" y="71" width="13" height="9" rx="1.8" fill="#000000" opacity="0.7" transform="rotate(25 67.5 75)"/>
  <rect x="36" y="66" width="13" height="9" rx="1.8" fill="#ffffff" opacity="0.5" transform="rotate(-25 42.5 70)"/>

  <!-- Star 1 - Small (top left, just touching central image) -->
  <g transform="translate(30,50) scale(2.1)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>

  <!-- Star 2 - Large (top right, just touching central image) -->
  <g transform="translate(100,50) scale(3.9)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#00d4aa"/>
  </g>

  <!-- Star 3 - Medium (bottom right, just touching central image) -->
  <g transform="translate(85,95) scale(3.0)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ffffff"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>

</svg>
