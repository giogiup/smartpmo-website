<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Central scoring circles in grayscale -->
  <circle cx="64" cy="64" r="32" fill="#000000" opacity="0.3"/>
  <circle cx="64" cy="64" r="24" fill="#808080" opacity="0.5"/>
  <circle cx="64" cy="64" r="16" fill="#ffffff" opacity="0.7"/>
  <circle cx="64" cy="64" r="8" fill="#000000"/>
  
  <!-- Score bars/indicators in grayscale -->
  <rect x="40" y="32" width="13.3" height="8" rx="1.6" fill="#ffffff" opacity="0.8"/>
  <rect x="74.7" y="34.7" width="13.3" height="8" rx="1.6" fill="#808080" opacity="0.8"/>
  <rect x="34.7" y="85.3" width="13.3" height="8" rx="1.6" fill="#000000" opacity="0.8"/>
  <rect x="80" y="82.7" width="13.3" height="8" rx="1.6" fill="#ffffff" opacity="0.8"/>
  
  <!-- Connection lines in grayscale -->
  <path d="M48 40 L56 50.7" stroke="#ffffff" stroke-width="6.4" opacity="0.7"/>
  <path d="M80 42.7 L72 50.7" stroke="#808080" stroke-width="6.4" opacity="0.7"/>
  <path d="M45.3" y="85.3 L56 77.3" stroke="#000000" stroke-width="6.4" opacity="0.7"/>
  <path d="M82.7 82.7 L72 77.3" stroke="#ffffff" stroke-width="6.4" opacity="0.7"/>
  
  <!-- Star 1 - Small (top left, close to scoring system) -->
  <g transform="translate(25,25) scale(2.1)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
  
  <!-- Star 2 - Large (top right, close to scoring system) -->
  <g transform="translate(100,28) scale(3.9)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#00d4aa"/>
  </g>
  
  <!-- Star 3 - Medium (bottom left, close to scoring system) -->
  <g transform="translate(30,95) scale(3.0)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ffffff"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
</svg>
