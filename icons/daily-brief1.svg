<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24" fill="none">
  <!-- Envelope -->
  <path d="M5 6 H19 V16 H5 Z M5 6 L12 12 L19 6" fill="#00d4aa" stroke="#008866" stroke-width="0.5" opacity="0.8"/>
  <!-- Circuit lines connecting stars -->
  <path d="M8 6 L16 8" fill="none" stroke="#4da6ff" stroke-width="0.3" stroke-dasharray="0.5 0.5" opacity="0.7"/>
  <path d="M16 8 L12 14" fill="none" stroke="#4da6ff" stroke-width="0.3" stroke-dasharray="0.5 0.5" opacity="0.7"/>
  <path d="M12 14 L8 6" fill="none" stroke="#4da6ff" stroke-width="0.3" stroke-dasharray="0.5 0.5" opacity="0.7"/>
  <!-- Circuit pattern (small rectangles along lines) -->
  <rect x="10" y="6.5" width="0.4" height="0.4" fill="#4da6ff" opacity="0.7"/>
  <rect x="14" y="7.5" width="0.4" height="0.4" fill="#4da6ff" opacity="0.7"/>
  <rect x="14" y="11" width="0.4" height="0.4" fill="#4da6ff" opacity="0.7"/>
  <rect x="10" y="10" width="0.4" height="0.4" fill="#4da6ff" opacity="0.7"/>
  <!-- Star 1 (top left) -->
  <g transform="translate(8,6) scale(0.7)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc" stroke="#008866" stroke-width="0.3"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#0066cc"/>
  </g>
  <!-- Star 2 (top right, with glow) -->
  <g transform="translate(16,8) scale(0.7)">
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc" stroke="#008866" stroke-width="0.3" filter="url(#glow)"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#0080ff"/>
  </g>
  <!-- Star 3 (bottom center) -->
  <g transform="translate(12,14) scale(0.7)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc" stroke="#008866" stroke-width="0.3"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#4da6ff" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
</svg>
