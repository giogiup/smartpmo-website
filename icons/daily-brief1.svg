<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24" fill="none">
  <!-- Calendar frame -->
  <rect x="8" y="8" width="8" height="8" rx="2" fill="#00d4aa" stroke="#008866" stroke-width="0.5" opacity="0.8"/>
  <!-- Checkmark in calendar -->
  <path d="M10 12.5 L11.5 14 L14 10.5" stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Orbital path -->
  <path d="M12 12 m-4,0 a4,2.5 0 1,0 8,0 a4,2.5 0 1,0 -8,0" fill="none" stroke="#00ffcc" stroke-width="0.3" opacity="0.4"/>
  <!-- Star 1 (top, ~120° orbit) -->
  <g transform="translate(12,8) scale(0.6)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="url(#grad1)"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#0066cc"/>
    <animateTransform attributeName="transform" type="scale" values="0.6;0.65;0.6" dur="2s" repeatCount="indefinite" additive="sum"/>
  </g>
  <!-- Star 2 (bottom left, ~240° orbit) -->
  <g transform="translate(9.5,14.5) scale(0.6)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="url(#grad2)"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#0080ff"/>
    <animateTransform attributeName="transform" type="scale" values="0.6;0.65;0.6" dur="2s" begin="0.2s" repeatCount="indefinite" additive="sum"/>
  </g>
  <!-- Star 3 (bottom right, ~0° orbit) -->
  <g transform="translate(14.5,14.5) scale(0.6)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="url(#grad3)"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#4da6ff" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
    <animateTransform attributeName="transform" type="scale" values="0.6;0.65;0.6" dur="2s" begin="0.4s" repeatCount="indefinite" additive="sum"/>
  </g>
  <!-- Gradient definitions for stars -->
  <defs>
    <radialGradient id="grad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#008866;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="grad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1"/>
    </radialGradient>
    <radialGradient id="grad3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ffcc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4da6ff;stop-opacity:1"/>
    </radialGradient>
  </defs>
</svg>
