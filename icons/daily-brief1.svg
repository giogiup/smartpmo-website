<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24" fill="none">
  <!-- Background envelope for newsletter context -->
  <path d="M5 6 H19 V16 H5 Z M5 6 L12 12 L19 6" fill="#00d4aa" stroke="#008866" stroke-width="0.5" opacity="0.8"/>
  <!-- Drone path (circuit-like trail) -->
  <path d="M6 14 Q10 10 12 6 Q14 10 18 14" fill="none" stroke="#4da6ff" stroke-width="0.4" stroke-dasharray="0.5 0.5" opacity="0.7"/>
  <!-- Circuit pattern (small dots along path) -->
  <circle cx="8" cy="12" r="0.3" fill="#4da6ff" opacity="0.7"/>
  <circle cx="12" cy="8" r="0.3" fill="#4da6ff" opacity="0.7"/>
  <circle cx="16" cy="12" r="0.3" fill="#4da6ff" opacity="0.7"/>
  <!-- Star 1 (bottom left) -->
  <g transform="translate(6,14) scale(0.7)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc" stroke="#008866" stroke-width="0.3"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#0066cc"/>
  </g>
  <!-- Star 2 (top center) -->
  <g transform="translate(12,6) scale(0.7)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc" stroke="#008866" stroke-width="0.3"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#0080ff"/>
  </g>
  <!-- Star 3 (bottom right) -->
  <g transform="translate(18,14) scale(0.7)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc" stroke="#008866" stroke-width="0.3"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#4da6ff" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
  <!-- Drone (positioned near bottom right star) -->
  <g transform="translate(18,14) scale(0.5)">
    <path d="M-2 -2 H2 V-1 H1 V1 H-1 V-1 H-2 Z" fill="#00ffcc" stroke="#008866" stroke-width="0.5"/>
    <path d="M-3 -3 L-2 -2 M3 -3 L2 -2 M-3 3 L-2 2 M3 3 L2 2" stroke="#4da6ff" stroke-width="0.3"/>
    <filter id="droneGlow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <circle cx="0" cy="0" r="1" fill="#00d4aa" filter="url(#droneGlow)"/>
  </g>
</svg>
