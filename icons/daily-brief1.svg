<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24" fill="none">
  <!-- Drone (central, quadcopter with camera) -->
  <g transform="translate(12,12) scale(1.2)">
    <!-- Body -->
    <rect x="-2.5" y="-1" width="5" height="2" rx="0.5" fill="#00d4aa" stroke="#008866" stroke-width="0.4"/>
    <!-- Camera -->
    <circle cx="0" cy="1.5" r="0.8" fill="#4da6ff" stroke="#008866" stroke-width="0.3"/>
    <!-- Propeller arms -->
    <path d="M-3 -2 L-2 -1 M3 -2 L2 -1 M-3 0 L-2 1 M3 0 L2 1" stroke="#008866" stroke-width="0.4"/>
    <!-- Propellers -->
    <path d="M-3 -2 L-4 -3 L-2 -3 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M3 -2 L4 -3 L2 -3 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M-3 0 L-4 1 L-2 1 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M3 0 L4 1 L2 1 Z" fill="#00ffcc" opacity="0.9"/>
  </g>
  <!-- Star 1 (smallest, top left, scale 0.4) -->
  <g transform="translate(8,6) scale(0.4)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#0066cc"/>
  </g>
  <!-- Star 2 (medium, top right, scale 0.5) -->
  <g transform="translate(16,8) scale(0.5)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#0080ff"/>
  </g>
  <!-- Star 3 (largest, bottom center, scale 0.45) -->
  <g transform="translate(12,16) scale(0.45)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ffffff"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
</svg>
