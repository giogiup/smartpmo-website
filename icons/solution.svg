<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <!-- Light bulb in grayscale with teal sparks -->
  <!-- Bulb glass -->
  <circle cx="64" cy="50" r="22" fill="#000000"/>
  <circle cx="64" cy="50" r="20" fill="#808080"/>
  <circle cx="64" cy="50" r="18" fill="#ffffff"/>
  
  <!-- Filament inside bulb -->
  <path d="M55 45 Q64 40 73 45 Q64 50 55 45" stroke="#808080" stroke-width="1.5" fill="none"/>
  <path d="M55 50 Q64 45 73 50 Q64 55 55 50" stroke="#808080" stroke-width="1.5" fill="none"/>
  <path d="M60 42 L68 42" stroke="#000000" stroke-width="1"/>
  <path d="M60 58 L68 58" stroke="#000000" stroke-width="1"/>
  
  <!-- Screw threads on base -->
  <rect x="54" y="72" width="20" height="8" fill="#808080"/>
  <rect x="55" y="73" width="18" height="6" fill="#ffffff"/>
  <line x1="54" y1="74" x2="74" y2="74" stroke="#000000" stroke-width="0.5"/>
  <line x1="54" y1="76" x2="74" y2="76" stroke="#000000" stroke-width="0.5"/>
  <line x1="54" y1="78" x2="74" y2="78" stroke="#000000" stroke-width="0.5"/>
  
  <!-- Bulb base/cap -->
  <rect x="56" y="80" width="16" height="12" fill="#000000"/>
  <rect x="57" y="81" width="14" height="10" fill="#808080"/>
  
  <!-- Contact point at bottom -->
  <circle cx="64" cy="96" r="3" fill="#000000"/>
  <circle cx="64" cy="96" r="2" fill="#ffffff"/>
  
  <!-- Highlight shine on bulb -->
  <ellipse cx="58" cy="44" rx="4" ry="6" fill="#ffffff" opacity="0.6"/>
  
  <!-- Teal lightning bolts coming off the bulb - longer jagged shapes -->
  <!-- Lightning bolt 1 - top right, jagged, overlapping bulb -->
  <path d="M75 38 L78 35 L76 37 L80 32 L78 35 L82 30 L80 33 L84 28 L82 31 L86 26 L84 29 L88 24 L86 27 L90 22 L87 26 L85 29 L83 32 L81 35 L79 38 L77 41 L75 38 Z" fill="#00ffcc" stroke="#ffffff" stroke-width="0.5"/>
  
  <!-- Lightning bolt 2 - left side, jagged, overlapping bulb -->
  <path d="M47 48 L44 45 L46 47 L42 42 L44 45 L40 40 L42 43 L38 38 L40 41 L36 36 L38 39 L34 34 L36 37 L32 32 L35 36 L37 39 L39 42 L41 45 L43 48 L45 51 L47 48 Z" fill="#00d4aa" stroke="#ffffff" stroke-width="0.5"/>
  
  <!-- Lightning bolt 3 - top left, jagged, overlapping bulb -->
  <path d="M53 35 L50 32 L52 34 L48 29 L50 32 L46 27 L48 30 L44 25 L46 28 L42 23 L44 26 L40 21 L42 24 L38 19 L41 23 L43 26 L45 29 L47 32 L49 35 L51 38 L53 35 Z" fill="#008866" stroke="#ffffff" stroke-width="0.5"/>
  
  <!-- Star 1 - Small (top left, closer to bulb) -->
  <g transform="translate(35,25) scale(2.1)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
  
  <!-- Star 2 - Large (top right, close to bulb) -->
  <g transform="translate(95,25) scale(3.9)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#00d4aa"/>
  </g>
  
  <!-- Star 3 - Medium (bottom left, higher up) -->
  <g transform="translate(42,80) scale(3.0)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ffffff"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
</svg>
