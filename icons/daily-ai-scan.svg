  <circle cx="44" cy="54" r="3" fill="#ffffff"/>
  
  <!-- Star 1 - Small (top left, close to radar) -->
  <g transform="translate(25,25) scale(2.1)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
