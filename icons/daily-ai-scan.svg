  <circle cx="64" cy="64" r="10" fill="none" stroke="#000000" stroke-width="4" opacity="0.8"/>
  
  <!-- Radar sweep line in white/gray -->
  <path d="M64 64 L99 29" stroke="#ffffff" stroke-width="6" opacity="0.7"/>
  <path d="M64 64 L99 29" stroke="#808080" stroke-width="3" opacity="0.5"/>
  
  <!-- Data points in grayscale -->
  <circle cx="79" cy="44" r="3.5" fill="#ffffff"/>
