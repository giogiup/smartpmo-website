<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="24" height="24" viewBox="0 0 24 24" fill="none">

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerUnits="strokeWidth"
            markerWidth="6" markerHeight="6"
            refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="#008866"/>
    </marker>
  </defs>

  <!-- Diagonal arrow from bottom-left to top-right -->
  <path d="M4 20 L20 4"
        stroke="#008866"
        stroke-width="2.5"
        fill="none"
        marker-end="url(#arrowhead)" />

  <!-- Star 1: top-left, small -->
  <g transform="translate(3,3) scale(0.5)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z"
          fill="#ffcc00"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z"
          fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z"
          fill="#ff6600"/>
  </g>

  <!-- Star 2: top-right, medium -->
  <g transform="translate(20,4) scale(0.6)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z"
          fill="#ffcc00"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z"
          fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z"
          fill="#ff6600"/>
  </g>

  <!-- Star 3: bottom-left, medium-small -->
  <g transform="translate(6,21) scale(0.45)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z"
          fill="#ffcc00"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z"
          fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z"
          fill="#ff6600"/>
  </g>

</svg>
