<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">

  <!-- Psychedelic Layered Speech Bubble -->
  <ellipse cx="64" cy="50" rx="35" ry="25" fill="#000000"/>
  <ellipse cx="64" cy="50" rx="33" ry="23" fill="#ffffff" opacity="0.8"/>
  <ellipse cx="64" cy="50" rx="31" ry="21" fill="#808080" opacity="0.7"/>
  <ellipse cx="64" cy="50" rx="29" ry="19" fill="#000000" opacity="0.9"/>
  <ellipse cx="64" cy="50" rx="27" ry="17" fill="#ffffff" opacity="0.6"/>
  <ellipse cx="64" cy="50" rx="25" ry="15" fill="#808080" opacity="0.8"/>

  <!-- Speech Bubble Tail -->
  <path d="M45 70 L35 85 L55 75 Z" fill="#000000"/>

  <!-- Speech Bubble Border/Highlight -->
  <ellipse cx="64" cy="50" rx="35" ry="25" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>

  <!-- Star 1 - Small (top left, just touching bubble) -->
  <g transform="translate(28,25) scale(2.1)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>

  <!-- Star 2 - Large (top right, just touching bubble) -->
  <g transform="translate(100,30) scale(3.9)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#00d4aa"/>
  </g>

  <!-- Star 3 - Medium (bottom right, just touching bubble) -->
  <g transform="translate(85,80) scale(3.0)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ffffff"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>

</svg>
