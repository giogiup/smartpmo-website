<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 24 24" fill="none">
  <!-- Clock face -->
  <rect x="8" y="8" width="8" height="8" rx="1" fill="#00d4aa" stroke="#008866" stroke-width="0.5"/>
  <!-- Clock center -->
  <circle cx="12" cy="12" r="1" fill="#008866"/>
  <!-- Clock hands -->
  <line x1="12" y1="12" x2="14" y2="12" stroke="#4da6ff" stroke-width="0.5" stroke-linecap="round"/>
  <line x1="12" y1="12" x2="12" y2="9" stroke="#4da6ff" stroke-width="0.5" stroke-linecap="round"/>
  <!-- Digital grid -->
  <path d="M9,10 H15" stroke="#00ffcc" stroke-width="0.2" opacity="0.4"/>
  <path d="M9,12 H15" stroke="#00ffcc" stroke-width="0.2" opacity="0.4"/>
  <path d="M9,14 H15" stroke="#00ffcc" stroke-width="0.2" opacity="0.4"/>
  <path d="M10,10 V14" stroke="#00ffcc" stroke-width="0.2" opacity="0.4"/>
  <path d="M12,10 V14" stroke="#00ffcc" stroke-width="0.2" opacity="0.4"/>
  <path d="M14,10 V14" stroke="#00ffcc" stroke-width="0.2" opacity="0.4"/>
  <!-- Star 1 (smallest, scale 0.4, top left) -->
  <g transform="translate(8,6) scale(0.4)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#0066cc"/>
  </g>
  <!-- Star 2 (medium, scale 0.5, top right) -->
  <g transform="translate(16,8) scale(0.5)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#00ffcc"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#0080ff"/>
  </g>
  <!-- Star 3 (largest, scale 0.45, bottom center) -->
  <g transform="translate(12,16) scale(0.45)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ffffff"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#00ffcc" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#008866"/>
  </g>
</svg>
