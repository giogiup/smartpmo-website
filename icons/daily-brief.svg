<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="128" height="128" viewBox="0 0 24 24" fill="none">

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowhead" markerUnits="strokeWidth"
            markerWidth="6" markerHeight="6"
            refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 Z" fill="#008866"/>
    </marker>
  </defs>

  <!-- Diagonal arrow from (3,21) up to (21,3) -->
  <path d="M3 21 L21 3"
        stroke="#008866"
        stroke-width="2.5"
        fill="none"
        marker-end="url(#arrowhead)" />

  <!-- Largest star (turquoise) -->
  <g transform="translate(17,6) scale(1.3)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z"
          fill="#00ffcc"/>
  </g>

  <!-- Medium star (light-teal) -->
  <g transform="translate(12,10) scale(1)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z"
          fill="#00d4aa"/>
  </g>

  <!-- Smallest star (deep-teal) -->
  <g transform="translate(6,17) scale(0.6)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z"
          fill="#008866"/>
  </g>

</svg>
