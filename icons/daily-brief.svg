<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  
  <!-- Main Speech Bubble -->
  <ellipse cx="64" cy="50" rx="35" ry="25" fill="#00d4aa"/>
  
  <!-- Speech Bubble Tail -->
  <path d="M45 70 L35 85 L55 75 Z" fill="#00d4aa"/>
  
  <!-- Speech Bubble Border/Highlight -->
  <ellipse cx="64" cy="50" rx="35" ry="25" fill="none" stroke="#00ffcc" stroke-width="2" opacity="0.6"/>
  
  <!-- 3-layer diamond stars in complementary colors -->
  
  <!-- Star 1 - Large (top left) -->
  <g transform="translate(25,25) scale(3.0)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ff6b35"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#ff8f65"/>
  </g>
  
  <!-- Star 2 - Medium (top right) -->
  <g transform="translate(100,30) scale(3.5)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ff8f65"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ffffff" opacity="0.8"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#ffb195"/>
  </g>
  
  <!-- Star 3 - Small (bottom right - closer to bubble) -->
  <g transform="translate(75,85) scale(2.8)">
    <path d="M0 -3 Q1 -1 3 0 Q1 1 0 3 Q-1 1 -3 0 Q-1 -1 0 -3 Z" fill="#ffffff"/>
    <path d="M0 -2 Q0.7 -0.7 2 0 Q0.7 0.7 0 2 Q-0.7 0.7 -2 0 Q-0.7 -0.7 0 -2 Z" fill="#ff6b35" opacity="0.9"/>
    <path d="M0 -1.2 Q0.4 -0.4 1.2 0 Q0.4 0.4 0 1.2 Q-0.4 0.4 -1.2 0 Q-0.4 -0.4 0 -1.2 Z" fill="#ff8f65"/>
  </g>
  
</svg>
